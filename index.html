<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Foundations of Nursing - Examination | NexStudy</title>
    <style>
        /* Reset margins and ensure full-screen iframe */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Optional: subtle loading indicator while iframe loads */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Full-screen Google Form Embed -->
    <!-- Note: Using the direct forms.gle redirect URL. For better embedding, use the full forms.google.com embed URL if available. -->

        id="examFrame"

        title="Foundations of Nursing Examination"
        allow="fullscreen"
        loading="lazy">
    </iframe>

</body>
